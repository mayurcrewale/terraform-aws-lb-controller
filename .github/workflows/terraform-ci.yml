name: Terraform CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump for a new release tag. Leave as none for a validate-only run."
        required: true
        type: choice
        default: none
        options:
          - none
          - patch
          - minor
          - major

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: terraform fmt check
        run: terraform fmt -check -recursive -diff

      - name: terraform init
        run: terraform init -backend=false -input=false

      - name: terraform validate
        run: terraform validate

  release:
    needs: validate
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.bump != 'none'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need full tag history to find the latest release

      - name: Determine next version
        id: version
        run: |
          set -euo pipefail
          LATEST_TAG=$(git tag --list 'v*' --sort=-v:refname | head -n1)
          if [ -z "$LATEST_TAG" ]; then LATEST_TAG="v0.0.0"; fi

          VERSION=${LATEST_TAG#v}
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)

          case "${{ github.event.inputs.bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "new_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          echo "### Releasing ${NEW_TAG}" >> "$GITHUB_STEP_SUMMARY"
          echo "Previous: \`${LATEST_TAG}\` -> New: \`${NEW_TAG}\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Create and push tag
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.new_tag }}" -m "Release ${{ steps.version.outputs.new_tag }}"
          git push origin "${{ steps.version.outputs.new_tag }}"
